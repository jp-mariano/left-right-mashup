<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>404 | Left Right Mashup</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, Avenir, Helvetica, Arial, sans-serif;
        --bg: #252a3a;
        --surface: #2c3248;
        --text: #e8eaf5;
        --muted: #9aa0bb;
        --blue: #3b92ff;
        --blue-hover: #2e85f5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }

      main {
        width: min(560px, 100%);
        background: var(--surface);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 1.5rem;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 2.6rem);
      }

      p {
        margin: 0.9rem 0 0;
        color: var(--muted);
        line-height: 1.55;
      }

      a {
        display: inline-block;
        margin-top: 1.25rem;
        padding: 0.6rem 1rem;
        border-radius: 8px;
        background: var(--blue);
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }

      a:hover {
        background: var(--blue-hover);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>404</h1>
      <p>The page you requested could not be found.</p>
      <p>Go back to Left Right Mashup and continue mixing audio in your browser.</p>
      <a href="/">Back to Home</a>
    </main>
  </body>
</html>
